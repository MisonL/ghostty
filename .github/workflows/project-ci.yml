name: Project CI

on:
  push: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: project-ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  linux-build-windows-native-smoke-artifact:
    name: Linux Build Windows Native Smoke Artifact
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build Windows smoke executable
        run: |
          mkdir -p ci-logs windows-smoke-artifact
          set -euo pipefail
          nix --accept-flake-config develop -c zig build \
            -Dtarget=x86_64-windows-gnu \
            -Dfont-backend=directwrite \
            -Dapp-runtime=win32 \
            -Drenderer=d3d12 \
            -Dci-windows-smoke-minimal=true \
            -Demit-exe=true 2>&1 | tee ci-logs/windows-smoke-build.log
          test -f zig-out/bin/ghostty.exe
          cp zig-out/bin/ghostty.exe windows-smoke-artifact/ghostty.exe

      - name: Upload Windows smoke executable
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-win32-d3d12-smoke-exe
          path: windows-smoke-artifact/
          if-no-files-found: error

      - name: Upload Windows smoke build logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-win32-d3d12-smoke-build-logs
          path: ci-logs/
          if-no-files-found: error

  windows-win32-d3d12-native-smoke:
    name: Windows Win32 D3D12 Native Smoke
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: windows-2022
    timeout-minutes: 30
    needs: linux-build-windows-native-smoke-artifact
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Windows smoke executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: windows-win32-d3d12-smoke-exe
          path: windows-smoke-artifact

      - name: Run Windows Win32 D3D12 smoke
        shell: pwsh
        env:
          GHOSTTY_CI_SMOKE_EXE_PATH: ${{ github.workspace }}\windows-smoke-artifact\ghostty.exe
          GHOSTTY_CI_WIN32_SMOKE_LAYER: hosted
          GHOSTTY_CI_WIN32_SMOKE_MODE: native
          GHOSTTY_CI_WIN32_REQUIRE_WINDOW: "true"
        run: .\.github\scripts\windows-win32-d3d12-smoke.ps1 -Mode native

      - name: Upload Windows smoke logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-win32-d3d12-smoke-logs
          path: ci-logs/
          if-no-files-found: error

  windows-win32-d3d12-core-draw-smoke:
    name: Windows Win32 D3D12 Core Draw Smoke
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: windows-2022
    timeout-minutes: 30
    needs: linux-build-windows-native-smoke-artifact
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Windows smoke executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: windows-win32-d3d12-smoke-exe
          path: windows-smoke-artifact

      - name: Run Windows Win32 D3D12 core draw smoke
        shell: pwsh
        env:
          GHOSTTY_CI_SMOKE_EXE_PATH: ${{ github.workspace }}\windows-smoke-artifact\ghostty.exe
          GHOSTTY_CI_WIN32_SMOKE_LAYER: hosted
          GHOSTTY_CI_WIN32_SMOKE_MODE: core-draw
          GHOSTTY_CI_WIN32_REQUIRE_WINDOW: "true"
        run: .\.github\scripts\windows-win32-d3d12-smoke.ps1 -Mode core-draw

      - name: Upload Windows core draw smoke logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-win32-d3d12-core-draw-smoke-logs
          path: ci-logs/
          if-no-files-found: error

  windows-win32-d3d12-basic-interaction:
    name: Windows Win32 D3D12 Basic Interaction
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: windows-2022
    timeout-minutes: 30
    needs: linux-build-windows-native-smoke-artifact
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Windows smoke executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: windows-win32-d3d12-smoke-exe
          path: windows-smoke-artifact

      - name: Run Windows Win32 basic interaction smoke
        shell: pwsh
        env:
          GHOSTTY_CI_SMOKE_EXE_PATH: ${{ github.workspace }}\windows-smoke-artifact\ghostty.exe
          GHOSTTY_CI_WIN32_SMOKE_LAYER: hosted
        run: .\.github\scripts\windows-win32-d3d12-interaction.ps1 -Mode basic

      - name: Upload Windows interaction smoke logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-win32-d3d12-basic-interaction-logs
          path: ci-logs/
          if-no-files-found: error
