name: Project CI

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: project-ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  linux-software-renderer-cpu-diagnostics-smoke:
    name: Linux Software Renderer CPU Diagnostics Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Zig toolchain
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .ci/zig
          key: zig-toolchain-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-toolchain-${{ runner.os }}-

      - name: Cache Zig package downloads
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cache/zig/p
          key: zig-pkgs-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-pkgs-${{ runner.os }}-

      - name: Cache Zig build cache (software compat)
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .cache/software-compat
          key: software-compat-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            software-compat-${{ runner.os }}-

      - name: Install Zig
        run: bash ./.github/scripts/ci-install-zig.sh

      - name: Run CPU route diagnostics smoke (drawFrame chain)
        run: |
          set -euo pipefail
          mkdir -p .cache/software-compat

          bash ./.github/scripts/software-renderer-compat-check.sh \
            --mode test \
            --transport auto \
            --expected-host-os linux \
            --mismatch-policy fail \
            --cache-dir .cache/software-compat \
            --expect-software-route-backend opengl \
            --app-runtime none \
            --test-filter "drawFrame software cpu smoke retries exhausted pool and clears platform transient state" \
            --expect-cpu-publish-retry-reason frame_pool_exhausted

          bash ./.github/scripts/software-renderer-compat-check.sh \
            --mode test \
            --transport auto \
            --expected-host-os linux \
            --mismatch-policy fail \
            --cache-dir .cache/software-compat \
            --expect-software-route-backend opengl \
            --app-runtime none \
            --test-filter "cpu route diagnostics kv helpers emit structured logs" \
            --expect-cpu-damage-overflow 1 \
            --expect-cpu-publish-retry-reason mailbox_backpressure \
            --expect-cpu-publish-warning true

          bash ./.github/scripts/software-renderer-compat-check.sh \
            --mode test \
            --transport auto \
            --expected-host-os linux \
            --mismatch-policy fail \
            --cache-dir .cache/software-compat \
            --expect-software-route-backend opengl \
            --app-runtime none \
            --test-filter "drawFrame software cpu smoke published frame clears pending state and finalizes unloading background" \
            --expect-cpu-publish-success true

  linux-build-windows-native-smoke-artifact:
    name: Linux Build Windows Native Smoke Artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Zig toolchain
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            .ci/zig
          key: zig-toolchain-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-toolchain-${{ runner.os }}-

      - name: Cache Zig package downloads
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cache/zig/p
          key: zig-pkgs-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-pkgs-${{ runner.os }}-

      - name: Install Zig
        run: bash ./.github/scripts/ci-install-zig.sh

      - name: Build Windows smoke executable
        run: |
          mkdir -p ci-logs windows-smoke-artifact
          set -euo pipefail
          : > ci-logs/windows-smoke-build.log
          for attempt in 1 2 3; do
            echo "===== zig build attempt ${attempt}/3 =====" | tee -a ci-logs/windows-smoke-build.log
            if zig build \
              -Dtarget=x86_64-windows-gnu \
              -Dfont-backend=directwrite \
              -Dapp-runtime=win32 \
              -Drenderer=d3d12 \
              -Dci-windows-smoke-minimal=true \
              -Demit-exe=true 2>&1 | tee -a ci-logs/windows-smoke-build.log; then
              break
            fi

            rc=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$rc"
            fi
            sleep $((attempt * 5))
          done
          test -f zig-out/bin/ghostty.exe
          cp zig-out/bin/ghostty.exe windows-smoke-artifact/ghostty.exe
          copied_pdb=0
          if [ -f zig-out/bin/ghostty-exe.pdb ]; then
            cp zig-out/bin/ghostty-exe.pdb windows-smoke-artifact/ghostty-exe.pdb
            copied_pdb=1
          fi
          if [ -f zig-out/bin/ghostty-dll.pdb ]; then
            cp zig-out/bin/ghostty-dll.pdb windows-smoke-artifact/ghostty-dll.pdb
            copied_pdb=1
          fi
          if [ "$copied_pdb" -eq 0 ]; then
            if compgen -G "zig-out/bin/*.pdb" > /dev/null; then
              cp zig-out/bin/*.pdb windows-smoke-artifact/
            else
              echo "No PDB files produced under zig-out/bin" > ci-logs/windows-smoke-no-pdb.txt
            fi
          fi
          if compgen -G "zig-out/bin/*.dll" > /dev/null; then
            cp zig-out/bin/*.dll windows-smoke-artifact/
          fi

      - name: Upload Windows smoke executable (and optional symbols)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-win32-d3d12-smoke-exe
          path: windows-smoke-artifact/
          if-no-files-found: error

      - name: Upload Windows smoke build logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-win32-d3d12-smoke-build-logs
          path: ci-logs/
          if-no-files-found: error

  windows-win32-d3d12-hosted-smoke:
    name: Windows Win32 D3D12 Hosted Smoke
    runs-on: windows-2022
    timeout-minutes: 30
    needs: linux-build-windows-native-smoke-artifact
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare diagnostics directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ci-logs, ci-dumps | Out-Null
          "ci-start $(Get-Date -Format o)" | Out-File -FilePath ci-logs/ci-start.txt -Encoding utf8
          try {
            Get-CimInstance Win32_VideoController |
              Select-Object Name, DriverVersion, AdapterRAM, VideoProcessor |
              Format-List | Out-File -FilePath ci-logs/windows-video.txt -Encoding utf8
          } catch {
          }

      - name: Enable crash dumps (WER)
        shell: pwsh
        run: .\.github\scripts\windows-win32-crash-dumps.ps1 -Action enable -ExeName ghostty.exe -DumpDir ci-dumps

      - name: Download Windows smoke executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        env:
          NODE_NO_WARNINGS: "1"
        with:
          name: windows-win32-d3d12-smoke-exe
          path: windows-smoke-artifact

      - name: Run Windows Win32 D3D12 smoke (native)
        shell: pwsh
        env:
          GHOSTTY_CI_SMOKE_EXE_PATH: ${{ github.workspace }}\windows-smoke-artifact\ghostty.exe
          GHOSTTY_CI_WIN32_SMOKE_LAYER: hosted
          GHOSTTY_CI_WIN32_SMOKE_MODE: native
          GHOSTTY_CI_WIN32_SMOKE_TIMEOUT_SECONDS: "90"
        run: .\.github\scripts\windows-win32-d3d12-smoke.ps1 -Mode native

      - name: Run Windows Win32 D3D12 smoke (core-draw)
        shell: pwsh
        env:
          GHOSTTY_CI_SMOKE_EXE_PATH: ${{ github.workspace }}\windows-smoke-artifact\ghostty.exe
          GHOSTTY_CI_WIN32_SMOKE_LAYER: hosted
          GHOSTTY_CI_WIN32_SMOKE_MODE: core-draw
          GHOSTTY_CI_WIN32_SMOKE_TIMEOUT_SECONDS: "90"
        run: .\.github\scripts\windows-win32-d3d12-smoke.ps1 -Mode core-draw

      - name: Run Windows Win32 interaction (basic)
        shell: pwsh
        env:
          GHOSTTY_CI_SMOKE_EXE_PATH: ${{ github.workspace }}\windows-smoke-artifact\ghostty.exe
          GHOSTTY_CI_WIN32_SMOKE_LAYER: hosted
        run: .\.github\scripts\windows-win32-d3d12-interaction.ps1 -Mode basic

      - name: Collect crash dumps
        if: always()
        shell: pwsh
        run: .\.github\scripts\windows-win32-crash-dumps.ps1 -Action collect -ExeName ghostty.exe -DumpDir ci-dumps

      - name: Upload Windows hosted smoke artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-win32-d3d12-hosted-smoke-artifacts
          path: |
            ci-logs/
            ci-dumps/
          if-no-files-found: error
